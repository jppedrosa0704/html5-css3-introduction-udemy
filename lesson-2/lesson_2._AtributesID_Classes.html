<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width, initial-scale=1.0">
  <title>Meu HTML</title>

  <style>
    h1 {
      background: rgba(255, 0, 0, 0.751);
    }

    p {
      background: blue;
    }

    #heading-two {
      background: purple;
    }

    .gray-background {
      background: gray;
    }

    .bold {
      color: rgba(255, 0, 0, 0.893);
    }
  </style>
</head>

<body>
  <h1 id="heading-one" class="red-background red-border">
    Cabeçalho 1
  </h1>

  <h1 id="heading-two">
    Cabeçalho 2
  </h1>

  <h1 class="gray-background">
    Heading three
  </h1>

  <p>
    <b class="bold">Jp</b> é o melhor!
  </p>
</body>

</html>
