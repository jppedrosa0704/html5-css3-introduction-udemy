<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=u, initial-scale=1.0">
  <title>Document</title>

  <style>
    * {
      margin: 0;
      padding: 0;
    }

    nav {
      background: red;
      height: 60px;
    }
    nav a {
      color: white;
      text-decoration: none;
      padding: 5px;
      font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
      font-size: 35px;
      padding: 20px;
      background: red;
      display: block;
      text-transform: uppercase;
    }

    nav a:hover {
      background: rgba(0,0,0,0,0.3);
    }

    nav {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 11px;
    }
    nav ul {
      display: flex;
      list-style: none;
    }

  </style>

</head>
<body>
  <nav>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Products</a></li>
    </ul>
  </nav>

  <ul>
    <li>item 1</li>
    <li>item 2</li>

    <li>item 4</li>
  </ul>

  <ol>
    <li>item 1</li>
    <li>item 2</li>
    <li>item 3</li>
    <li>item 4</li>
  </ol>
  
  <ol type="I">
    <li>item 1</li>
    <li>item 2</li>
    <li>item 3</li>
    <li>item 4</li>
  </ol>

  <ol type="A">
    <li>item 1</li>
    <li>item 2</li>
    <li>item 3</li>
    <li>item 4</li>
  </ol>

<dl>

</body>
</html>
