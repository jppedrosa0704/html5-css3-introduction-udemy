<!DOCTYPE html>
<html lang="pt-BT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    body {
      font-family: sans-serif;
    }

    table {
      border-collapse: collapse;
      width: 300%
    }
    table, thead, th, td {
      border: 1px solid #ccc;
      padding: 5px;
      text-align: left;
    }

    table caption {
      caption-side: top;
      text-align: left;
      font-style: italic;
      font-size: 14px;
      margin-bottom: 5px;
    }

    tfoot td, table th {
      background: #ddd;
    }

    tfoot td {
      font-style: italic;

    }

    .responsive-table {
      max-width: 100%;
      overflow-x: auto;
    }

  </style>

</head>
<body>
  <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit.</p>
  <div class="responsive-table">
    <table>
      <caption>uma descrição para a tabela</caption>
      <thead>
        <tr>
          <th>Título 1</th>
          <th>Título 2</th>
          <th>Título 3</th>
        </tr>
      </thead>
      
      <tbody>
        <tr>
          <td>Corpo 1</td>
          <td>Corpo 2</td>
          <td>Corpo 3</td>
        </tr>
        <tr>
          <td colspan="2">Corpo 4</td>
          <td>Corpo 6</td>
        </tr>
        <tr>
          <td>Corpo 7</td>
          <td>Corpo 8</td>
          <td>Corpo 9</td>
        </tr>
      </tbody> 

      <tfoot>
        <tr>
          <td colspan="2" rowspan="2"></td>
          <td rowspan="">Total:</td>
        </tr>
        <tr>
          <td>555£</td>
        </tr>
      </tfoot>
    </table>
  </div>
</body>

</html>
