<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Formulário</title>

  <style>
    label {
      cursor: pointer;
    }
    body {
      background-color: grey;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
  </style>
</head>

<body>
  <form action="#" method="get">
    
    <h2>Meu formulário</h2>

    <p>
      <label for="nome">Nome:</label>
      <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
    </p>

    <p>
      <label for="dev1">Sou um Dev1?</label>
      <input type="checkbox" id="dev1" name="dev1" value="yes" checked><br>

      <label for="dev2">Sou um Dev2?</label>
      <input type="checkbox" id="dev2" name="dev2" value="yes"><br>

      <label for="dev3">Sou um Dev3?</label>
      <input type="checkbox" id="dev3" name="dev3" value="yes">
    </p>

    <p>
      Gênero:<br>
      <label for="feminino">Feminino</label>
      <input type="radio" id="feminino" name="genero" value="feminino"><br>

      <label for="masculino">Masculino</label>
      <input type="radio" id="masculino" name="genero" value="masculino" checked><br>

      <label for="outros">Outros</label>
      <input type="radio" id="outros" name="genero" value="outros">
    </p>

    <p>
      <label for="data">Date:</label>
      <input type="date" id="data" name="data">
    </p>

    <p>
      <label for="datetime">Datetime:</label>
      <input type="datetime-local" id="datetime" name="datetime" value="2026-06-16T19:50">
    </p>

    <p>
      <label for="time">Time:</label>
      <input type="time" id="time" name="time" value="19:52:01">
    </p>

    <p>
      <label for="cor">Cor preferida:</label>
      <input type="color" id="cor" name="cor" value="#FF0000">
    </p>

    <p>
      <label for="email">E-mail:</label>
      <input type="email" id="email" name="email" placeholder="ex.: email@email.com">
    </p>

    <p>
      <label for="password">Password:</label>
      <input type="password" id="password" name="password" placeholder="Enter the password">
    </p>

    <p>
      <label for="file">Sua foto:</label>
      <input type="file" id="file" name="file" accept=".png" multiple>
    </p>

    <p>
      <label for="number">Number:</label>
      <input type="number" id="number" name="number" placeholder="Choose a number" min="0" max="100">
    </p>

    <p>
      <label for="range">Range:</label>
      <input type="range" id="range" name="range" min="0" max="1000" step="100" list="tickmarks">
    </p>

    <datalist id="tickmarks">
      <option value="0" label="0%">
      <option value="100">
      <option value="200">
      <option value="300">
      <option value="400">
      <option value="500">
      <option value="600">
      <option value="700">
      <option value="800">
      <option value="900">
      <option value="1000">
    </datalist>

    <p>
      <label for="search">Search:</label>
      <input type="search" id="search" name="search">
    </p>

    <p>
      <label for="select">Select:</label>
      <select name="select" id="select">
        <option value="">Escolha uma opção</option>

        <optgroup label="Metal Bands">
          <option value="metallica" disabled>Metallica</option>
          <option value="iron-maiden">Iron Maiden</option>
          <option value="helloween">Helloween</option>
        </optgroup>

        <optgroup label="Metal Bands II">
          <option value="blind-guardian" disabled>Blind Guardian</option>
          <option value="gamma-ray">Gamma Ray</option>
          <option value="primal-fear">Primal Fear</option>
        </optgroup>
      </select>
    </p>

    <p>
      <label for="textarea">Textarea:</label>
      <textarea name="textarea" id="textarea" rows="3"></textarea>
    </p>

    <p>
      <button type="reset">Reset</button>
      <button type="submit">Submit</button>
    </p>

  </form>
</body>
</html>
